<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger glow for accents -->
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sparkle gradient -->
    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background glow circle -->
  <circle cx="100" cy="100" r="70" fill="url(#mainGrad)" opacity="0.15" filter="url(#glow)"/>

  <!-- The S shape - proper letter S -->
  <path d="M 130 45
           C 130 45, 145 45, 145 60
           C 145 80, 120 85, 100 90
           C 80 95, 55 100, 55 120
           C 55 140, 70 155, 100 155
           C 115 155, 130 150, 140 140"
        fill="none"
        stroke="url(#mainGrad)"
        stroke-width="22"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Top serif/terminal of S -->
  <path d="M 70 55
           C 85 40, 110 38, 130 45"
        fill="none"
        stroke="url(#mainGrad)"
        stroke-width="22"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Data flow dots along the S -->
  <circle cx="75" cy="52" r="6" fill="#06b6d4" filter="url(#strongGlow)"/>
  <circle cx="140" cy="60" r="5" fill="#818cf8" filter="url(#strongGlow)"/>
  <circle cx="100" cy="100" r="6" fill="#8b5cf6" filter="url(#strongGlow)"/>
  <circle cx="60" cy="130" r="5" fill="#a855f7" filter="url(#strongGlow)"/>
  <circle cx="130" cy="145" r="6" fill="#c084fc" filter="url(#strongGlow)"/>

  <!-- Sparkle accents -->
  <circle cx="68" cy="42" r="3" fill="white" opacity="0.9"/>
  <circle cx="150" cy="55" r="2" fill="white" opacity="0.7"/>
  <circle cx="48" cy="115" r="2" fill="white" opacity="0.7"/>
  <circle cx="145" cy="138" r="3" fill="white" opacity="0.9"/>

  <!-- Small floating particles -->
  <circle cx="160" cy="80" r="2" fill="#06b6d4" opacity="0.6"/>
  <circle cx="45" cy="85" r="1.5" fill="#a855f7" opacity="0.6"/>
  <circle cx="155" cy="120" r="1.5" fill="#6366f1" opacity="0.5"/>
  <circle cx="50" cy="150" r="2" fill="#c084fc" opacity="0.5"/>
</svg>
