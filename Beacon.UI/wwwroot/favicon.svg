<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient glow behind -->
  <path d="M 68 20
           C 55 15, 32 18, 30 30
           C 28 42, 45 48, 50 50
           C 55 52, 72 58, 70 70
           C 68 82, 45 85, 32 80"
        fill="none"
        stroke="url(#sGrad)"
        stroke-width="16"
        stroke-linecap="round"
        opacity="0.4"/>

  <!-- Main S stroke -->
  <path d="M 68 20
           C 55 15, 32 18, 30 30
           C 28 42, 45 48, 50 50
           C 55 52, 72 58, 70 70
           C 68 82, 45 85, 32 80"
        fill="none"
        stroke="url(#sGrad)"
        stroke-width="11"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Data nodes -->
  <circle cx="68" cy="20" r="5" fill="#06b6d4" filter="url(#glow)"/>
  <circle cx="32" cy="80" r="5" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="4" fill="#6366f1" filter="url(#glow)"/>

  <!-- Sparkles -->
  <circle cx="66" cy="17" r="2" fill="white" opacity="0.9"/>
  <circle cx="30" cy="77" r="2" fill="white" opacity="0.8"/>
</svg>
