name: Deploy to staging

on:
  push:
    branches:
      - main
      - setup/docker

jobs:
  build:
    uses: ./.github/workflows/w-call-build.yml

  deploy-staging:
    uses: ./.github/workflows/w-call-deploy.yml
    needs: build
    with:
      environment: staging
    secrets: 
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}