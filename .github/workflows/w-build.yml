name: Build the Semantico Release

on:
  release:
    types: [published]

jobs:
  build:
    name: "Build and Publish Semantico"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '9.0'

    - name: Restore dependencies
      run: dotnet restore

    - name: Find and publish packable projects
      run: |
        # Find all .csproj files with IsPackable=true
        PACKABLE_PROJECTS=$(find . -name "*.csproj" -not -path "*/bin/*" -not -path "*/obj/*" -exec grep -l "<IsPackable>true</IsPackable>" {} \;)

        echo "Found packable projects:"
        echo "$PACKABLE_PROJECTS"

        # Pack and push each project
        for PROJECT in $PACKABLE_PROJECTS; do
          PROJECT_DIR=$(dirname "$PROJECT")
          PROJECT_NAME=$(basename "$PROJECT_DIR")

          echo "Processing: $PROJECT_NAME"

          # Create NuGet package
          dotnet pack "$PROJECT" \
            -p:PackageVersion=${{github.ref_name}} \
            --configuration Release \
            --no-restore

          # Find and push the package
          PACKAGE_PATH=$(find "$PROJECT_DIR/bin/Release" -name "$PROJECT_NAME.${{github.ref_name}}.nupkg" | head -n 1)

          if [ -f "$PACKAGE_PATH" ]; then
            echo "Pushing package: $PACKAGE_PATH"
            dotnet nuget push "$PACKAGE_PATH" \
              --source https://api.nuget.org/v3/index.json \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --skip-duplicate
          else
            echo "Error: Package not found for $PROJECT_NAME"
            exit 1
          fi
        done