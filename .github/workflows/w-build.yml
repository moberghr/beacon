name: Build the Semantico Release

on:
  release:
    types: [published]

jobs:
  build:
    name: "Build and Publish Semantico"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '8.0'
        
    - name: Install dependencies
      run: |
        cd Semantico.Api
        dotnet restore

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: "Build application"
      run: dotnet build --configuration Release --no-restore

    - name: "Publish application"
      run: dotnet publish --no-build -c Release -p:PublishProfile=github -p:PublishDir=./publish -p:Version=${{github.ref_name}}