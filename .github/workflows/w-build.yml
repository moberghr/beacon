name: Build the Beacon Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    name: "Build and Publish Beacon"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0'

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore --property WarningLevel=0

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal

    - name: Find and publish packable projects
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        echo "Publishing version: $VERSION"

        # Get projects from solution file (only projects in solution will be processed)
        SOLUTION_PROJECTS=$(grep -E '\.csproj"' Beacon.sln | sed 's/.*"\([^"]*\.csproj\)".*/\1/' | sed 's/\\/\//g')

        echo "Projects in solution:"
        echo "$SOLUTION_PROJECTS"

        # Filter to only packable projects
        PACKABLE_PROJECTS=""
        for PROJECT in $SOLUTION_PROJECTS; do
          if [ -f "$PROJECT" ] && grep -q "<IsPackable>true</IsPackable>" "$PROJECT"; then
            PACKABLE_PROJECTS="$PACKABLE_PROJECTS $PROJECT"
          fi
        done

        echo "Packable projects:"
        echo "$PACKABLE_PROJECTS"

        # Pack and push each project
        for PROJECT in $PACKABLE_PROJECTS; do
          PROJECT_DIR=$(dirname "$PROJECT")
          PROJECT_NAME=$(basename "$PROJECT_DIR")

          echo "Processing: $PROJECT_NAME"

          # Create NuGet package
          dotnet pack "$PROJECT" \
            -p:PackageVersion="$VERSION" \
            --configuration Release \
            --no-build

          # Find and push the package
          PACKAGE_PATH=$(find "$PROJECT_DIR/bin/Release" -name "$PROJECT_NAME.$VERSION.nupkg" | head -n 1)

          if [ -f "$PACKAGE_PATH" ]; then
            echo "Pushing package: $PACKAGE_PATH"
            dotnet nuget push "$PACKAGE_PATH" \
              --source https://api.nuget.org/v3/index.json \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --skip-duplicate
          else
            echo "Error: Package not found for $PROJECT_NAME"
            exit 1
          fi
        done