name: Build the Semantico Release

on:
  release:
    types: [published]

jobs:
  build:
    name: "Build and Publish Semantico"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '8.0'
    
    - name: Add the GitHub NuGet Source
      run: |
        dotnet nuget add source "https://nuget.pkg.github.com/moberghr/index.json" --name github --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

    - name: Semantico.Core - Install dependencies
      working-directory: Semantico.Core
      run: dotnet restore

    - name: "Semantico.Core - Create a NuGet package"
      working-directory: Semantico.Core
      run: dotnet pack -p:PackageVersion=${{github.ref_name}} --configuration Release

    - name: "Semantico.Core - Push NuGet package"
      working-directory: Semantico.Core
      run: dotnet nuget push "bin/Release/Semantico.Core.${{github.ref_name}}.nupkg" --source "github"

    - name: Semantico.UI - Install dependencies
      working-directory: Semantico.UI
      run: dotnet restore

    - name: "Semantico.UI - Create a NuGet package"
      working-directory: Semantico.UI
      run: dotnet pack -p:PackageVersion=${{github.ref_name}} --configuration Release

    - name: "Semantico.UI - Push NuGet package"
      working-directory: Semantico.UI
      run: dotnet nuget push "bin/Release/Semantico.UI.${{github.ref_name}}.nupkg" --source "github"

    - name: "Cleanup - Remove NuGet Source"
      run: dotnet nuget remove source github