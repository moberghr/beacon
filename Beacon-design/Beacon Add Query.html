<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beacon · New Query</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="page-header.jsx"></script>
<script type="text/babel" src="add-query.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", tweaks.theme);
  }, [tweaks.theme]);

  return (
    <div className="app">
      <Sidebar active="Queries" />
      <main className="main">
        <header className="topbar">
          <div className="breadcrumb">
            <a href="Beacon Dashboard.html" className="breadcrumb__crumb">Workspace</a>
            <span className="breadcrumb__sep">/</span>
            <a href="#" className="breadcrumb__crumb">Alerts</a>
            <span className="breadcrumb__sep">/</span>
            <a href="#" className="breadcrumb__crumb">Queries</a>
            <span className="breadcrumb__sep">/</span>
            <span className="breadcrumb__current">New query</span>
          </div>
          <button className="topbar__search">
            <Icon.Search size={14} />
            <span>Search queries, sources, recipients…</span>
            <span className="topbar__search-kbd">
              <span className="kbd">⌘</span><span className="kbd">K</span>
            </span>
          </button>
          <div className="topbar__right">
            <button className="icon-btn" title="Toggle theme"
              onClick={() => setTweak("theme", tweaks.theme === "light" ? "dark" : "light")}>
              {tweaks.theme === "light" ? <Icon.Moon size={15} /> : <Icon.Sun size={15} />}
            </button>
            <button className="icon-btn" title="Notifications">
              <Icon.Bell size={15} />
              <span className="icon-btn__dot"></span>
            </button>
            <button className="icon-btn"><Icon.Cog size={15} /></button>
          </div>
        </header>
        <AddQueryPage />
      </main>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio label="Mode" value={tweaks.theme}
            onChange={(v) => setTweak("theme", v)}
            options={[{ value: "light", label: "Light" }, { value: "dark", label: "Dark" }]} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
