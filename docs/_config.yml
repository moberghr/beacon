# Site settings
title: "Semantico Documentation"
description: "Comprehensive documentation for Semantico - semantic database alerting and notification system"
baseurl: "/semantico" # Project path for GitHub Pages
url: "https://mibu.github.io"

# Build settings
markdown: kramdown
remote_theme: just-the-docs/just-the-docs

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme

# Theme settings (just-the-docs)
color_scheme: nil  # Use default, or create custom
logo: "/assets/images/logo.png"

# Navigation
nav_external_links:
  - title: GitHub
    url: https://github.com/MiBu/semantico

# Accessibility
aux_links:
  "View on GitHub":
    - "https://github.com/MiBu/semantico"

# Skip to content for screen readers
skip_to_content: true

# SEO
lang: en-US
author: Semantico Team

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/
  - vendor/

# Collections (optional for future use)
collections_dir: collections

# Search (disabled per clarification)
search_enabled: false
