# Site settings
title: "Beacon Documentation"
description: "Comprehensive documentation for Beacon - semantic database alerting and notification system"
baseurl: "/semantico" # Project path for GitHub Pages
url: "https://mibu.github.io"

# Build settings
markdown: kramdown
remote_theme: just-the-docs/just-the-docs

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme

# Theme settings (just-the-docs)
color_scheme: beacon  # Custom color scheme based on logo
logo: "assets/images/logo.svg"
favicon_ico: "/favicon.svg"

# Navigation
nav_external_links:
  - title: GitHub
    url: https://github.com/MiBu/semantico

# Accessibility
aux_links:
  "View on GitHub":
    - "https://github.com/MiBu/semantico"

# Skip to content for screen readers
skip_to_content: true

# SEO
lang: en-US
author: Beacon Team

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/
  - vendor/

# Collections (optional for future use)
collections_dir: collections

# Server port
port: 4001

# Search (disabled per clarification)
search_enabled: false

# Mermaid diagrams support
mermaid:
  version: "10.6.1"

# Centralized URLs - define URLs once, reference throughout documentation
urls:
  # Repository
  github_repo: "https://github.com/MiBu/semantico"
  github_issues: "https://github.com/MiBu/semantico/issues"
  github_discussions: "https://github.com/MiBu/semantico/discussions"

  # Documentation
  docs_base: "https://mibu.github.io/semantico"
  docs_installation: "https://mibu.github.io/semantico/getting-started/installation"
  docs_quick_start: "https://mibu.github.io/semantico/getting-started/quick-start"
  docs_configuration: "https://mibu.github.io/semantico/getting-started/configuration"
  docs_features: "https://mibu.github.io/semantico/features/"
  docs_architecture: "https://mibu.github.io/semantico/advanced/architecture"
  docs_contributing: "https://mibu.github.io/semantico/contributing/guidelines"
  docs_troubleshooting: "https://mibu.github.io/semantico/troubleshooting/common-issues"

  # NuGet packages
  nuget: "https://www.nuget.org/"

  # External
  dotnet: "https://dotnet.microsoft.com/"
