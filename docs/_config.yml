# Site settings
title: "Beacon Documentation"
description: "Documentation for Beacon — semantic database monitoring, alerting, and orchestration for .NET, with a governed MCP server for AI assistants"
baseurl: "/beacon" # Project path for GitHub Pages
url: "https://moberghr.github.io"

# Build settings
markdown: kramdown
remote_theme: just-the-docs/just-the-docs

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme

# Theme settings (just-the-docs)
color_scheme: beacon  # Custom color scheme based on logo
logo: "assets/images/beacon-logo.svg"
favicon_ico: "/favicon.svg"

# Navigation
nav_external_links:
  - title: GitHub
    url: https://github.com/moberghr/beacon

# Accessibility
aux_links:
  "View on GitHub":
    - "https://github.com/moberghr/beacon"

# Skip to content for screen readers
skip_to_content: true

# SEO
lang: en-US
author: Beacon Team

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/
  - vendor/
  - plans/      # internal MTK implementation plans — not published
  - specs/      # internal MTK feature specs — not published

# Collections (optional for future use)
collections_dir: collections

# Server port
port: 4001

# Search (disabled per clarification)
search_enabled: false

# Mermaid diagrams support
mermaid:
  version: "10.6.1"

# Centralized URLs - define URLs once, reference throughout documentation
urls:
  # Repository
  github_repo: "https://github.com/moberghr/beacon"
  github_issues: "https://github.com/moberghr/beacon/issues"
  github_discussions: "https://github.com/moberghr/beacon/discussions"

  # Documentation
  docs_base: "https://moberghr.github.io/beacon"
  docs_installation: "https://moberghr.github.io/beacon/getting-started/installation"
  docs_quick_start: "https://moberghr.github.io/beacon/getting-started/quick-start"
  docs_configuration: "https://moberghr.github.io/beacon/getting-started/configuration"
  docs_features: "https://moberghr.github.io/beacon/features/"
  docs_architecture: "https://moberghr.github.io/beacon/advanced/architecture"
  docs_contributing: "https://moberghr.github.io/beacon/contributing/guidelines"
  docs_troubleshooting: "https://moberghr.github.io/beacon/troubleshooting/common-issues"

  # NuGet packages
  nuget: "https://www.nuget.org/"

  # External
  dotnet: "https://dotnet.microsoft.com/"
