<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Semantico text -->
  <text x="50" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="url(#gradient)">Semantico</text>

  <!-- Stylized S logo with flowing lines -->
  <g transform="translate(2, 6)">
    <!-- Outer flowing lines (cyan to blue) -->
    <path d="M 8 0 Q 20 0, 22 6" stroke="url(#gradient1)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 6 4 Q 18 4, 20 10" stroke="url(#gradient1)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 4 8 Q 16 8, 18 14" stroke="url(#gradient2)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <!-- Middle S curve -->
    <path d="M 2 12 Q 14 12, 16 18 Q 18 24, 6 24" stroke="url(#gradient2)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <!-- Inner flowing lines (purple to magenta) -->
    <path d="M 4 16 Q 12 16, 14 22 Q 16 28, 8 28" stroke="url(#gradient3)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 6 20 Q 10 20, 12 26 Q 14 32, 10 32" stroke="url(#gradient3)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 8 24 Q 10 24, 10 30 Q 12 36, 12 36" stroke="url(#gradient4)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <!-- Dots on lines -->
    <circle cx="22" cy="6" r="2.5" fill="#00d4ff"/>
    <circle cx="20" cy="10" r="2.5" fill="#00d4ff"/>
    <circle cx="18" cy="14" r="2.5" fill="#4da6ff"/>
    <circle cx="16" cy="18" r="2.5" fill="#0066ff"/>
    <circle cx="6" cy="24" r="2.5" fill="#0066ff"/>
    <circle cx="8" cy="28" r="2.5" fill="#8b5cf6"/>
    <circle cx="10" cy="32" r="2.5" fill="#c946ff"/>
    <circle cx="12" cy="36" r="2.5" fill="#e946ff"/>
  </g>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4da6ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4da6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e946ff;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
